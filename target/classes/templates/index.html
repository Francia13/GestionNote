<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <h1 class="page-title">ETU3593 - Gestion des notes examen </h1>

        <div class="filter-section">
            <!-- <h2 class="filter-title">Recherche par Nom</h2> -->
            <!-- <form method="get" action="/" class="filter-form">
                <input type="text" name="eleve" class="form-control" placeholder="Nom Élève">
                <input type="text" name="matiere" class="form-control" placeholder="Nom Matière">
                <button type="submit" class="btn">Filtrer</button>
            </form> -->

            <!-- <h2 class="filter-title">Recherche par ID</h2> -->
            <form method="get" action="/filterById" class="filter-form">
                <input type="number" name="idEleve" class="form-control" placeholder="ID Élève">
                <input type="number" name="idMatiere" class="form-control" placeholder="ID Matière">
                <button type="submit" class="btn">Filtrer</button>
            </form>
        </div>

        <div class="table-section">
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Id</th>
                            <th>Eleve</th>
                            <th>Matiere</th>
                            <th>Note finale</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="note : ${notes}">
                            <td th:text="${note.id}"></td>
                            <td th:text="${note.nomEleve}"></td>
                            <td th:text="${note.nomMatiere}"></td>
                            <td th:text="${note.noteFinale}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
